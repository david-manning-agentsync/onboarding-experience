<!-- om-login.html — Login page (Onboarding theme) -->
<style>
  .login-outer { min-height: calc(100vh - 44px); background: var(--color-bg-page); display: flex; align-items: center; justify-content: center; padding: var(--space-8); }
  .login-card { background: var(--color-bg-surface); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; padding: var(--space-10) var(--space-8); }
  .login-logo { font-size: var(--font-size-xl); font-weight: var(--font-weight-extrabold); color: var(--color-primary-600); text-align: center; margin-bottom: var(--space-2); letter-spacing: var(--tracking-tight); }
  .login-customer { text-align: center; font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-bottom: var(--space-8); }
  .login-headline { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); text-align: center; margin-bottom: var(--space-6); }
  .login-options { display: flex; flex-direction: column; gap: var(--space-3); }
  .login-option { border: 2px solid var(--color-border-default); border-radius: var(--radius-md); padding: var(--space-4) var(--space-5); cursor: pointer; transition: border-color var(--transition-fast), box-shadow var(--transition-fast); display: flex; align-items: center; gap: var(--space-4); }
  .login-option:hover { border-color: var(--color-primary-600); box-shadow: 0 0 0 3px var(--color-primary-100); }
  .login-option--featured { border-color: var(--color-primary-300); background: var(--color-primary-50); }
  .login-option--featured:hover { border-color: var(--color-primary-600); }
  .login-option__icon { font-size: 24px; flex-shrink: 0; }
  .login-option__title { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text-primary); }
  .login-option__desc { font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: 2px; }
  .login-divider { display: flex; align-items: center; gap: var(--space-3); margin: var(--space-4) 0; font-size: var(--font-size-xs); color: var(--color-text-muted); font-weight: var(--font-weight-medium); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border-default); }
</style>

<div class="login-outer">
  <div class="login-card">
    <div class="login-logo">AgentSync</div>
    <div class="login-customer">Globe Life Insurance</div>
    <div class="login-headline">Sign in to Onboarding</div>

    <div class="login-options">
      <!-- SSO — featured for Globe -->
      <div class="login-option login-option--featured" onclick="go('screen-om-transition')">
        <div class="login-option__icon">🔐</div>
        <div>
          <div class="login-option__title">Globe Life SSO</div>
          <div class="login-option__desc">Sign in with your Globe Life corporate account</div>
        </div>
        <span style="margin-left:auto;color:var(--color-primary-600);font-size:var(--font-size-xs);font-weight:var(--font-weight-semibold);">Recommended</span>
      </div>

      <div class="login-divider">or</div>

      <!-- Username/Password -->
      <div class="login-option" onclick="go('screen-om-transition')">
        <div class="login-option__icon">🔑</div>
        <div>
          <div class="login-option__title">Email &amp; Password</div>
          <div class="login-option__desc">Sign in with your AgentSync credentials</div>
        </div>
      </div>
    </div>
  </div>
</div>
