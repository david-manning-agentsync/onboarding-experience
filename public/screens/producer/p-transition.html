<!-- p-transition.html — Producer loading screen (Onboarding theme) -->
<style>
  .transition-outer { min-height: calc(100vh - 44px); background: var(--color-bg-page); display: flex; align-items: center; justify-content: center; }
  .transition-inner { text-align: center; display: flex; flex-direction: column; align-items: center; gap: var(--space-6); }
  .spinner { width: 48px; height: 48px; border: 4px solid var(--color-primary-100); border-top-color: var(--color-primary-600); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .transition-text { font-size: var(--font-size-base); color: var(--color-text-secondary); font-weight: var(--font-weight-medium); }
  .transition-logo { font-size: var(--font-size-lg); font-weight: var(--font-weight-extrabold); color: var(--color-primary-600); letter-spacing: var(--tracking-tight); }
</style>

<div class="transition-outer">
  <div class="transition-inner">
    <div class="transition-logo">AgentSync</div>
    <div class="spinner"></div>
    <div class="transition-text">Signing you in…</div>
    <button class="btn btn--secondary" onclick="go('screen-p-intake')">Continue →</button>
  </div>
</div>
