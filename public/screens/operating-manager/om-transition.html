<!-- om-transition.html — Loading/transition screen (Onboarding theme) -->
<style>
  #screen-om-transition .transition-outer { min-height: calc(100vh - 44px); background: var(--color-bg-page); display: flex; align-items: center; justify-content: center; }
  #screen-om-transition .transition-inner { text-align: center; display: flex; flex-direction: column; align-items: center; gap: var(--space-6); }
  #screen-om-transition .spinner { width: 48px; height: 48px; border: 4px solid var(--color-primary-100); border-top-color: var(--color-primary-600); border-radius: 50%; animation: om-spin 0.8s linear infinite; }
  @keyframes om-spin { to { transform: rotate(360deg); } }
  #screen-om-transition .transition-text { font-size: var(--font-size-base); color: var(--color-text-secondary); font-weight: var(--font-weight-medium); }
  #screen-om-transition .transition-logo { font-size: var(--font-size-lg); font-weight: var(--font-weight-extrabold); color: var(--color-primary-600); letter-spacing: var(--tracking-tight); }
</style>

<div class="transition-outer">
  <div class="transition-inner">
    <div class="transition-logo">AgentSync</div>
    <div class="spinner"></div>
    <div class="transition-text">Signing you in…</div>
    <button class="btn btn--secondary" onclick="go('screen-om-welcome')">Continue →</button>
  </div>
</div>
