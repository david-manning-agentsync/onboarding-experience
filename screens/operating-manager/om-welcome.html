<!-- om-welcome.html — Operating Manager welcome (Onboarding theme) -->
<style>
  #screen-om-welcome .om-shell { height: calc(100vh - 44px); display: flex; flex-direction: column; }
  #screen-om-welcome .om-topnav { height: 56px; flex-shrink: 0; background: var(--color-bg-surface); border-bottom: 1px solid var(--color-border-default); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-6); z-index: 200; }
  #screen-om-welcome .om-topnav__brand { display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-size-base); font-weight: var(--font-weight-bold); color: var(--color-text-primary); }
  #screen-om-welcome .om-topnav__brand-icon { width: 28px; height: 28px; border-radius: var(--radius-md); background: var(--color-primary-600); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
  #screen-om-welcome .om-topnav__right { display: flex; align-items: center; gap: var(--space-3); }
  #screen-om-welcome .om-topnav__org { display: flex; align-items: center; gap: var(--space-1); font-size: var(--font-size-sm); color: var(--color-text-secondary); padding: 4px 10px; border: 1px solid var(--color-border-default); border-radius: var(--radius-md); cursor: pointer; background: var(--color-bg-input); }
  #screen-om-welcome .om-icon-btn { width: 34px; height: 34px; border-radius: var(--radius-full); border: 1px solid var(--color-border-default); background: var(--color-bg-input); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--color-text-secondary); }
  #screen-om-welcome .om-topnav__avatar { width: 32px; height: 32px; border-radius: var(--radius-full); background: var(--color-primary-600); color: #fff; font-size: var(--font-size-xs); font-weight: var(--font-weight-bold); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  #screen-om-welcome .om-layout { position: relative; flex: 1; overflow: hidden; }
  #screen-om-welcome .om-sidebar { position: absolute; top: 0; left: 0; bottom: 0; width: 220px; background: var(--color-bg-nav); border-right: 1px solid var(--color-border-default); padding: var(--space-4) 0; overflow-y: auto; }
  #screen-om-welcome .om-main { position: absolute; top: 0; left: 220px; right: 0; bottom: 0; overflow-y: auto; background: var(--color-bg-page); padding: var(--space-8); }
  #screen-om-welcome .welcome-hero { max-width: 560px; margin: var(--space-16) auto 0; text-align: center; }
  #screen-om-welcome .welcome-hero__greeting { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); color: var(--color-text-primary); line-height: var(--line-height-tight); margin-bottom: var(--space-3); }
  #screen-om-welcome .welcome-hero__sub { font-size: var(--font-size-base); color: var(--color-text-secondary); margin-bottom: var(--space-8); line-height: var(--line-height-relaxed); }
  #screen-om-welcome .welcome-cta-row { display: flex; gap: var(--space-3); justify-content: center; }
  #screen-om-welcome .welcome-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); max-width: 560px; margin: var(--space-10) auto 0; }
  #screen-om-welcome .stat-card { background: var(--color-bg-surface); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: var(--space-5); text-align: center; box-shadow: var(--shadow-xs); }
  #screen-om-welcome .stat-card__num { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); color: var(--color-primary-600); }
  #screen-om-welcome .stat-card__label { font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: var(--space-1); font-weight: var(--font-weight-medium); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
</style>

<div class="om-shell">
  <div class="om-topnav">
    <div class="om-topnav__brand">
      <div class="om-topnav__brand-icon">A</div>
      AgentSync Onboarding
    </div>
    <div class="om-topnav__right">
      <div class="om-topnav__org">
        Globe Life Insurance
        <svg viewBox="0 0 12 12" width="10" fill="currentColor"><path d="M2 4l4 4 4-4"/></svg>
      </div>
      <div class="om-icon-btn">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2a6 6 0 016 6c0 3.5 1 5 1.5 6H2.5C3 13 4 11.5 4 8a6 6 0 016-6zm0 16a2 2 0 002-2H8a2 2 0 002 2z"/></svg>
      </div>
      <div class="om-topnav__avatar">JT</div>
    </div>
  </div>

  <div class="om-layout">
    <div class="om-sidebar">
      <div class="sidebar__section-label">Navigation</div>
      <div class="nav-item" onclick="go('screen-om-producers')">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="7" r="3"/><path d="M2 17c0-3.3 2.7-6 6-6h0m4 5l2 2 4-4"/></svg>
        Producers
      </div>
      <div class="nav-item" onclick="go('screen-om-tasks')">
        <svg class="nav-item__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="14" height="14" rx="2"/><path d="M7 10l2 2 4-4"/></svg>
        Tasks
      </div>
    </div>

    <div class="om-main">
      <div class="welcome-hero">
        <div class="welcome-hero__greeting">Welcome back, Jamie 👋</div>
        <div class="welcome-hero__sub">You're the Operating Manager for Globe Life Insurance. Use AgentSync to track your producers' onboarding progress and ensure everyone is sell-ready.</div>
        <div class="welcome-cta-row">
          <button class="btn btn--primary btn--lg" onclick="go('screen-om-producers')">View Producers</button>
          <button class="btn btn--secondary btn--lg" onclick="go('screen-om-invite-producer')">Invite Producer</button>
        </div>
      </div>
      <div class="welcome-stats">
        <div class="stat-card">
          <div class="stat-card__num">12</div>
          <div class="stat-card__label">Active Producers</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__num" style="color:var(--color-warning-600)">4</div>
          <div class="stat-card__label">Needs Attention</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__num" style="color:var(--color-success-600)">8</div>
          <div class="stat-card__label">Sell-Ready</div>
        </div>
      </div>
    </div>
  </div>
</div>
