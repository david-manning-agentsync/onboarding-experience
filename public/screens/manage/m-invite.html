<!-- m-invite.html — Invite Onboarding Partner (Manage / SLDS theme) -->
<style>
  #screen-m-invite .ms-shell {
    position: relative;
    height: calc(100vh - 44px);
    background: var(--color-bg-page);
    font-family: var(--font-family-base);
  }
  #screen-m-invite .ms-nav {
    position: absolute; top: 0; left: 0; right: 0; z-index: 200;
    height: 52px;
    background: var(--color-bg-surface);
    border-bottom: 1px solid var(--color-border-default);
    display: flex; align-items: center;
    padding: 0 var(--space-medium);
    gap: var(--space-medium);
  }
  #screen-m-invite .ms-nav__waffle {
    color: var(--color-gray-500); flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center;
  }
  #screen-m-invite .ms-nav__brand {
    font-size: var(--font-size-lg); font-weight: var(--font-weight-bold);
    color: var(--color-text-primary); white-space: nowrap; flex-shrink: 0;
  }
  #screen-m-invite .ms-nav__search {
    flex: 1; max-width: 280px;
    display: flex; align-items: center;
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-md);
    height: 28px; padding: 0 var(--space-x-small);
    background: var(--color-bg-surface);
    gap: var(--space-xx-small);
  }
  #screen-m-invite .ms-nav__search input {
    border: none; outline: none; font-family: var(--font-family-base);
    font-size: var(--font-size-base); color: var(--color-text-primary);
    background: transparent; width: 100%;
  }
  #screen-m-invite .ms-nav__search input::placeholder { color: var(--color-text-muted); }
  #screen-m-invite .ms-nav__icons {
    display: flex; align-items: center; gap: var(--space-x-small);
  }
  #screen-m-invite .ms-nav__icon {
    width: 28px; height: 28px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; border-radius: var(--radius-md);
    color: var(--color-gray-500); transition: background var(--transition-fast);
  }
  #screen-m-invite .ms-nav__icon:hover { background: var(--color-gray-100); }
  #screen-m-invite .ms-nav__avatar {
    width: 28px; height: 28px; border-radius: var(--radius-full);
    background: var(--color-brand-500); color: #fff;
    font-size: var(--font-size-xs); font-weight: var(--font-weight-bold);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  #screen-m-invite .ms-nav__sep {
    width: 1px; height: 24px; background: var(--color-border-default);
    margin: 0 var(--space-x-small); flex-shrink: 0;
  }
  #screen-m-invite .ms-nav__tabs {
    display: flex; align-items: stretch; height: 100%;
  }
  #screen-m-invite .ms-nav__tab {
    display: flex; align-items: center; gap: 4px;
    padding: 0 var(--space-medium);
    font-size: var(--font-size-base); color: var(--color-text-secondary);
    cursor: pointer; white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: color var(--transition-fast);
  }
  #screen-m-invite .ms-nav__tab:hover { color: var(--color-text-primary); }
  #screen-m-invite .ms-nav__tab.active {
    color: var(--color-brand-500);
    border-bottom-color: var(--color-brand-500);
    font-weight: var(--font-weight-bold);
  }
  #screen-m-invite .ms-nav__tab--disabled {
    color: var(--color-text-muted); cursor: default; pointer-events: none;
  }
  #screen-m-invite .ms-nav__caret { font-size: 10px; color: var(--color-gray-400); }

  #screen-m-invite .ms-body {
    position: absolute; top: 52px; left: 0; right: 0; bottom: 0;
    overflow-y: auto; background: var(--color-bg-page);
    display: flex; align-items: flex-start; justify-content: center;
    padding: var(--space-x-large) var(--space-large);
  }

  #screen-m-invite .invite-card {
    background: var(--color-bg-surface);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 560px; overflow: hidden;
  }
  #screen-m-invite .invite-card__header {
    padding: var(--space-medium) var(--space-large);
    border-bottom: 1px solid var(--color-border-default);
    background: var(--color-bg-subtle);
  }
  #screen-m-invite .invite-card__title {
    font-size: var(--font-size-lg); font-weight: var(--font-weight-bold);
    color: var(--color-text-primary);
  }
  #screen-m-invite .invite-card__subtitle {
    font-size: var(--font-size-base); color: var(--color-text-secondary); margin-top: 2px;
  }
  #screen-m-invite .invite-card__body { padding: var(--space-large); }
  #screen-m-invite .invite-card__footer {
    padding: var(--space-medium) var(--space-large);
    border-top: 1px solid var(--color-border-default);
    background: var(--color-bg-subtle);
    display: flex; justify-content: flex-end; gap: var(--space-x-small);
  }
  #screen-m-invite .or-divider {
    display: flex; align-items: center; gap: var(--space-medium);
    margin: var(--space-medium) 0;
    font-size: var(--font-size-xs); color: var(--color-text-secondary);
    font-weight: var(--font-weight-bold); text-transform: uppercase;
    letter-spacing: var(--tracking-caps);
  }
  #screen-m-invite .or-divider::before,
  #screen-m-invite .or-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--color-border-default);
  }
</style>

<div class="ms-shell">

  <!-- Single-row Nav -->
  <div class="ms-nav">
    <div class="ms-nav__waffle">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="15" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/><rect x="15" y="8" width="5" height="5" rx="1"/><rect x="1" y="15" width="5" height="5" rx="1"/><rect x="8" y="15" width="5" height="5" rx="1"/><rect x="15" y="15" width="5" height="5" rx="1"/></svg>
    </div>
    <div class="ms-nav__brand">AgentSync</div>
    <div class="ms-nav__search">
      <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--color-text-muted);flex-shrink:0"><circle cx="9" cy="9" r="6"/><path d="M14 14l4 4"/></svg>
      <input type="text" placeholder="Search AgentSync...">
    </div>
    <div class="ms-nav__icons">
      <div class="ms-nav__icon" title="Favorites">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2l2.4 5 5.6.8-4 3.9.9 5.5L10 14.8l-4.9 2.4.9-5.5L2 7.8l5.6-.8z"/></svg>
      </div>
      <div class="ms-nav__icon" title="Add">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 4v12M4 10h12"/></svg>
      </div>
      <div class="ms-nav__icon" title="Help">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><path d="M8 8a2 2 0 114 0c0 1.5-2 2-2 3.5M10 15.5v.5"/></svg>
      </div>
      <div class="ms-nav__icon" title="Setup">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="2.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/></svg>
      </div>
      <div class="ms-nav__icon" title="Notifications">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2a6 6 0 016 6c0 3.5 1 5 1.5 6H2.5C3 13 4 11.5 4 8a6 6 0 016-6zm0 16a2 2 0 002-2H8a2 2 0 002 2z"/></svg>
      </div>
      <div class="ms-nav__avatar">JD</div>
    </div>
    <div class="ms-nav__sep"></div>
    <div class="ms-nav__tabs">
      <div class="ms-nav__tab active" onclick="go('screen-m-accounts')">
        Accounts <span class="ms-nav__caret">▾</span>
      </div>
      <div class="ms-nav__tab ms-nav__tab--disabled">
        Producer Detail <span class="ms-nav__caret">▾</span>
      </div>
      <div class="ms-nav__tab ms-nav__tab--disabled">
        Contracts <span class="ms-nav__caret">▾</span>
      </div>
      <div class="ms-nav__tab" onclick="go('screen-m-policysets')">
        Policy Sets <span class="ms-nav__caret">▾</span>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="ms-body">
    <div class="invite-card">
      <div class="invite-card__header">
        <div class="invite-card__title">Invite Onboarding Partner</div>
        <div class="invite-card__subtitle">Globe Life Insurance</div>
      </div>
      <div class="invite-card__body">
        <div class="form-group">
          <label class="form-label">Select Existing Contact</label>
          <select class="form-select">
            <option value="">-- Search contacts --</option>
            <option>Sarah Chen — sarah.chen@globelife.com</option>
            <option>Marcus Rivera — m.rivera@globelife.com</option>
            <option>Dana Park — dpark@globelife.com</option>
          </select>
        </div>

        <div class="or-divider">or invite a new contact</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-medium);">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" placeholder="First name">
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" placeholder="Last name">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email <span class="required">*</span></label>
          <input type="email" class="form-input" placeholder="partner@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-select">
            <option value="">-- Select role --</option>
            <option>Onboarding Manager</option>
            <option>Compliance Officer</option>
            <option>HR Administrator</option>
            <option>Agency Principal</option>
          </select>
          <span class="form-hint">Determines what this person can see and do in Onboarding.</span>
        </div>

        <div style="margin-top:var(--space-medium);padding-top:var(--space-medium);border-top:1px solid var(--color-border-default);">
          <label class="form-checkbox">
            <input type="checkbox">
            <span>This person is also functioning as a producer</span>
          </label>
          <div class="form-hint" style="margin-top:4px;padding-left:24px;">
            They will receive both an Onboarding Partner invite and a Producer task checklist.
          </div>
        </div>
      </div>
      <div class="invite-card__footer">
        <button class="btn btn--neutral" onclick="go('screen-m-account-record')">Cancel</button>
        <button class="btn btn--brand" onclick="go('screen-m-account-record');showToast('Invite sent to onboarding partner')">Send Invite</button>
      </div>
    </div>
  </div>
</div>
